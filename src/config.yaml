site:
  name: PYROS AI Creative
  site: 'https://pyrosaicreative.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null

# Default SEO metadata
metadata:
  title:
    default: PYROS AI Creative
    template: '%s | PYROS AI Creative'

  description: 'Learn AI Filmmaking. Build AI Stories. Professional tutorials, cinematic AI workflows and production-ready Prompt Packs for filmmakers, storytellers and content creators.'

  robots:
    index: true
    follow: true

  openGraph:
    site_name: PYROS AI Creative
    images:
      - url: 'https://pyrosaicreative.com/images/hero/hero-home.png'
        width: 1200
        height: 630
    type: website

  twitter:
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
